name: CI

on:
  push:
    branches-ignore:
      - main
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  CMAKE_TLS_VERIFY: 0
  VCPKG_DISABLE_METRICS: 1

jobs:

  build-linux:
    runs-on: ubuntu-24.04
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6
      - name: Setup cmake
        uses: lukka/get-cmake@v4.2.2
        with:
          useLocalCache: true
          useCloudCache: false
      - name: Compile
        run: |
          sudo apt-get update
          sudo apt-get remove libgd3 
          sudo apt-get install curl libpthread-stubs0-dev libcurl4-openssl-dev libgd-dev libavif-dev libffi-dev libargon2-dev -y
          cmake -B .
          cmake --build . -- -j 12
          chmod +x zuri/zuri
      - name: Test
        run: ctest --rerun-failed --output-on-failure
      - name: Generate Artifacts
        if: '!cancelled()'
        uses: actions/upload-artifact@v4
        with:
          name: zuri-linux-${{ github.run_id }}
          path: ${{github.workspace}}/zuri
  
  build-linux-arm:
    runs-on: ubuntu-24.04-arm
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6
      - name: Setup cmake
        uses: lukka/get-cmake@v4.2.2
        with:
          useLocalCache: true
          useCloudCache: false
      - name: Compile
        run: |
          sudo apt-get update
          sudo apt-get remove libgd3 
          sudo apt-get install curl libpthread-stubs0-dev libcurl4-openssl-dev libgd-dev libavif-dev libffi-dev libargon2-dev -y
          cmake -B .
          cmake --build . -- -j 12
          chmod +x zuri/zuri
      - name: Test
        run: ctest --rerun-failed --output-on-failure
      - name: Generate Artifacts
        if: '!cancelled()'
        uses: actions/upload-artifact@v4
        with:
          name: zuri-linux-arm-${{ github.run_id }}
          path: ${{github.workspace}}/zuri

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Setup cmake
        uses: lukka/get-cmake@v4.2.2
        with:
          useLocalCache: true
          useCloudCache: false
      - uses: actions/checkout@v6
      - name: Setup dependencies
        run: |
          brew uninstall pkg-config --ignore-dependencies
          brew install pkg-config gd libffi libargon2
      - name: Compile
        run: |
          cmake -B . -DOPENSSL_ROOT_DIR=/usr/local/opt/openssl
          cmake --build . -- -j 12
          chmod 755 zuri/zuri
      - name: Test
        run: ctest --rerun-failed --output-on-failure
      - name: Generate Artifacts
        if: '!cancelled()'
        uses: actions/upload-artifact@v4
        with:
          name: zuri-macos-${{ github.run_id }}
          path: ${{github.workspace}}/zuri

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Setup cmake
        uses: lukka/get-cmake@latest
        with:
          cmakeVersion: '4.2.x'
          useLocalCache: true
          useCloudCache: false
      - name: Setup WinLibs
        uses: bwoodsend/setup-winlibs-action@v1.8
        with:
          add_to_path: true
          tag: 14.2.0posix-19.1.7-12.0.0-msvcrt-r3
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install dependencies
        uses: johnwason/vcpkg-action@v8
        with:
          pkgs: pkgconf curl libffi openssl libgd argon2
          extra-args: --disable-metrics
          revision: master
          triplet: x64-windows-release
          token: ${{ github.token }}
      - name: Compile
        run: |
          cmake -B . -G "Unix Makefiles" -DVCPKG_TARGET_TRIPLET=x64-windows-release -DCMAKE_MAKE_PROGRAM=mingw32-make -DCMAKE_TOOLCHAIN_FILE="${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake"
          cmake --build . -- -j 12
      - name: Test
        run: ctest --rerun-failed --output-on-failure
      - name: Generate Artifacts
        if: '!cancelled()'
        uses: actions/upload-artifact@v4
        with:
          name: zuri-windows-default-${{ github.run_id }}
          path: ${{github.workspace}}/zuri
