name: Create Release with artifacts

on:
  release:
    types: [published]

env:
  CMAKE_TLS_VERIFY: 0

jobs:

  build-linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: Setup cmake
        uses: lukka/get-cmake@v4.2.2
        with:
          useLocalCache: true
          useCloudCache: false
      - name: Compile
        run: |
          sudo apt-get update
          sudo apt-get remove libgd3 
          sudo apt-get install curl libpthread-stubs0-dev libcurl4-openssl-dev libgd-dev libavif-dev libffi-dev -y
          cmake -B .
          cmake --build . -- -j 12
      - name: Create ZIP Archive
        run: |
          chmod +x zuri/zuri
          zip -r9 --symlinks zuri_linux.zip zuri/
      - name: Generate Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux
          path: zuri_linux.zip
      - name: Upload Artifact to Release
        uses: actions/upload-release-asset@v1.0.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: zuri_linux.zip
          asset_name: zuri-linux-${{ github.event.release.tag_name }}.zip
          asset_content_type: application/zip

  build-linux-arm:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6
      - name: Setup cmake
        uses: lukka/get-cmake@v4.2.2
        with:
          useLocalCache: true
          useCloudCache: false
      - name: Compile
        run: |
          sudo apt-get update
          sudo apt-get remove libgd3 
          sudo apt-get install curl libpthread-stubs0-dev libcurl4-openssl-dev libgd-dev libavif-dev libffi-dev -y
          cmake -B .
          cmake --build . -- -j 12
      - name: Create ZIP Archive
        run: |
          chmod +x zuri/zuri
          zip -r9 --symlinks zuri_linux-aarch64.zip zuri/
      - name: Generate Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux
          path: zuri_linux-aarch64.zip
      - name: Upload Artifact to Release
        uses: actions/upload-release-asset@v1.0.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: zuri_linux-aarch64.zip
          asset_name: zuri-linux-aarch64-${{ github.event.release.tag_name }}.zip
          asset_content_type: application/zip

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Setup cmake
        uses: lukka/get-cmake@v4.2.2
        with:
          useLocalCache: true
          useCloudCache: false
      - uses: actions/checkout@v6
      - name: Setup dependencies
        run: |
          brew uninstall pkg-config --ignore-dependencies
          brew install pkg-config gd libffi
      - name: Compile
        run: |
          cmake -B . -DOPENSSL_ROOT_DIR=/usr/local/opt/openssl
          cmake --build .
      - name: Create ZIP Archive
        run: |
          chmod 755 zuri/zuri
          zip -r9 --symlinks zuri_macos.zip zuri/
      - name: Generate Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos
          path: zuri_macos.zip
      - name: Upload Artifact to Release
        uses: actions/upload-release-asset@v1.0.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: zuri_macos.zip
          asset_name: zuri-macos-${{ github.event.release.tag_name }}.zip
          asset_content_type: application/zip

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Setup cmake
        uses: lukka/get-cmake@latest
        with:
          cmakeVersion: '4.2.x'
          useLocalCache: true
          useCloudCache: false
      - name: Setup WinLibs
        uses: bwoodsend/setup-winlibs-action@v1.8
        with:
          add_to_path: true
          tag: 14.2.0posix-19.1.7-12.0.0-msvcrt-r3
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install dependencies
        uses: johnwason/vcpkg-action@v8
        with:
          pkgs: pkgconf curl libffi openssl libgd
          extra-args: --disable-metrics
          revision: master
          triplet: x64-windows-release
          token: ${{ github.token }}
      - name: Compile
        run: |
          cmake -B . -G "Unix Makefiles" -DVCPKG_TARGET_TRIPLET=x64-windows-release -DCMAKE_MAKE_PROGRAM=mingw32-make -DCMAKE_TOOLCHAIN_FILE="${{ env.VCPKG_ROOT }}/scripts/buildsystems/vcpkg.cmake"
          cmake --build .
      - name: Create ZIP Archive
        shell: cmd
        run: |
          powershell Compress-Archive zuri zuri_windows.zip
      - name: Generate Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: zuri_windows.zip
      - name: Upload Artifact to Release
        uses: actions/upload-release-asset@v1.0.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: zuri_windows.zip
          asset_name: zuri-windows-${{ github.event.release.tag_name }}.zip
          asset_content_type: application/zip
